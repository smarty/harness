services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
      MYSQL_DATABASE: harness
    ports:
      - 3306:3306
    healthcheck:
      test: "mysql -uroot -e 'select 1'"
      interval: 2s
      timeout: 20s
      retries: 10
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: "rabbitmq-diagnostics -q check_running"
      interval: 2s
      timeout: 20s
      retries: 10
